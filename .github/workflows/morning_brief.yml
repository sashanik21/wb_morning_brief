name: WB Morning Brief MVP

on:
  workflow_dispatch:

  schedule:
    - cron: "30 4 * * *"

jobs:
  run-morning-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run WB Morning Brief
        env:
          WB_API_TOKEN_TEST: ${{ secrets.WB_API_TOKEN_TEST }}
        run: python -m app.main
      - name: Upload funnel reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: funnel-reports
          path: reports/
          if-no-files-found: warn

