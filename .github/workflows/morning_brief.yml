name: WB Morning Brief

on:
  schedule:
    - cron: '05 06 * * *'
  workflow_dispatch:

jobs:
  run-morning-brief:
    runs-on: ubuntu-latest
    env:
      PROJECT_TIMEZONE: Europe/Moscow
      SCHEDULED_LOCAL_TIME: "09:05"
      SCHEDULED_CRON_UTC: "05 06 * * *"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run WB Morning Brief
        env:
          WB_API_TOKEN_TEST: ${{ secrets.WB_API_TOKEN_TEST }}
          WB_API_TOKEN_MILOVA: ${{ secrets.WB_API_TOKEN_MILOVA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Telegram token configured: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}"
          echo "Telegram chat configured: ${{ secrets.TELEGRAM_CHAT_ID != '' }}"
          echo "Supabase configured: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}"
          echo "Milova token configured: ${{ secrets.WB_API_TOKEN_MILOVA != '' }}"
          echo "SCHEDULED TIME: ${SCHEDULED_LOCAL_TIME} ${PROJECT_TIMEZONE}"
          echo "CRON UTC: ${SCHEDULED_CRON_UTC}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Local now: $(TZ=${PROJECT_TIMEZONE} date '+%Y-%m-%d %H:%M:%S %Z')"
          WORKFLOW_STARTED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          GITHUB_EVENT_SCHEDULE="$(python - <<'PY'
          import json
          import os

          path = os.environ.get("GITHUB_EVENT_PATH")
          try:
              with open(path, encoding="utf-8") as event_file:
                  print(json.load(event_file).get("schedule", ""))
          except Exception:
              print("")
          PY
          )"
          export WORKFLOW_STARTED_AT
          export GITHUB_EVENT_SCHEDULE
          echo "GITHUB EVENT:"
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "schedule=${GITHUB_EVENT_SCHEDULE}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch=true"
          else
            echo "workflow_dispatch=false"
          fi
          echo "SERVER TIME:"
          echo "UTC=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Europe/Moscow=$(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "CRON RAW:"
          echo "${SCHEDULED_CRON_UTC}"
          echo "EXPECTED UTC:"
          echo "06:05"
          echo "EXPECTED MSK:"
          echo "09:05"
          echo "Workflow run started: $(TZ=${PROJECT_TIMEZONE} date '+%H:%M') local"
          python -m app.main

      - name: Upload XLSX reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xlsx-reports
          path: reports/*.xlsx
          if-no-files-found: warn
